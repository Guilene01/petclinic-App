name: CI/CD Pipeline - Spring PetClinic

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '25'
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
  VAULT_JFROG_PATH: secrets/creds/jfrog
  JFROG_URL: ${{ secrets.JFROG_URL }}
  JFROG_REPO: 'devops-project'

jobs:

  # ---------------------------------------------------------------
  # 1. Checkout + Build (compile & package)
  # ---------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for SonarCloud analysis later

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compile and package (skip tests)
        run: mvn -B clean package -DskipTests

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ---------------------------------------------------------------
  # 2. Unit Tests
  # ---------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------
  # 3. SonarCloud Static Analysis
  # ---------------------------------------------------------------
  sonarQube-scan:
    name: SonarQube-Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Compile project for analysis
        run: mvn -B compile -DskipTests

      - name: SonarQube code analysis
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.java.binaries=target/classes
      - name: SonarCloud Quality Gate Check
        id: quality-gate
        uses: phwt/sonarqube-quality-gate-action@v1
        with:
          sonar-project-key: ${{ env.SONAR_PROJECT_KEY }}
          sonar-host-url: https://sonarcloud.io
          sonar-token: ${{ env.SONAR_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          fail-on-error: true
  # ---------------------------------------------------------------
  # 4. Trivy Vulnerability Scan (filesystem / dependencies)
  # ---------------------------------------------------------------
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: sonarQube-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Populate Maven cache
        run: mvn -B dependency:resolve -DskipTests --no-transfer-progress

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-results.*
          if-no-files-found: ignore

  # ---------------------------------------------------------------
  # 5. Publish to JFrog Artifactory
  # ---------------------------------------------------------------
  publish:
    name: Publish to JFrog Artifactory
    runs-on: ubuntu-latest
    needs: [ sonarQube-scan, trivy-scan ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Authenticate to Vault and fetch JFrog credentials
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            ${{ env.VAULT_JFROG_PATH }} username | JF_USER ;
            ${{ env.VAULT_JFROG_PATH }} password | JF_PASSWORD

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: http://18.207.100.83:8082
          JF_USER: ${{ env.JF_USER }}
          JF_PASSWORD: ${{ env.JF_PASSWORD }}

      - name: Upload JAR to Artifactory
        run: jf rt upload "target/*.jar" ${{ env.JFROG_REPO }}/

  # ---------------------------------------------------------------
  # 6. Smoke Test – launch EC2, deploy JAR, run Playwright UI tests
  #
  # Required secrets / vars:
  #   AWS_ROLE_ARN   – IAM role ARN for OIDC assumption (no static keys needed)
  #                    Trust policy must allow:
  #                      Principal: { Federated: "arn:aws:iam::<ACCT>:oidc-provider/token.actions.githubusercontent.com" }
  #                      Condition:  StringEquals: { "token.actions.githubusercontent.com:sub": "repo:<org>/<repo>:ref:refs/heads/main" }
  #   AWS_REGION     – e.g. us-east-1  (optional, defaults to us-east-1)
  #   SMOKE_SG_ID    – security group that allows inbound TCP 8080
  #   SMOKE_SUBNET_ID – public subnet (auto-assign public IP must be enabled)
  # ---------------------------------------------------------------
  smoke-test:
    name: Smoke Test (EC2 + Playwright)
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # OIDC requires id-token: write so GitHub can mint the JWT
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      EC2_INSTANCE_TYPE: t3.small

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── AWS auth via OIDC (no long-lived keys stored) ───────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Fetch JFrog creds from Vault (same path as publish job) ─
      - name: Fetch JFrog credentials from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            ${{ env.VAULT_JFROG_PATH }} username | JF_USER ;
            ${{ env.VAULT_JFROG_PATH }} password | JF_PASSWORD

      # ── Find the JAR we just published ──────────────────────────
      - name: Resolve latest JAR from JFrog
        id: jar
        env:
          JF_USER: ${{ env.JF_USER }}
          JF_PASSWORD: ${{ env.JF_PASSWORD }}
        run: |
          JAR_NAME=$(curl -fsSL \
            -u "$JF_USER:$JF_PASSWORD" \
            "http://18.207.100.83:8082/artifactory/api/storage/${{ env.JFROG_REPO }}/target/" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          jars = [c['uri'].lstrip('/') for c in data.get('children', []) if c['uri'].endswith('.jar')]
          if not jars:
              raise SystemExit('No JAR found in devops-project/target/')
          print(sorted(jars)[-1])
          ")
          echo "jar_name=${JAR_NAME}" >> $GITHUB_OUTPUT
          echo "Resolved JAR: ${JAR_NAME}"

      # ── Look up the freshest Amazon Linux 2023 AMI ──────────────
      - name: Resolve latest Amazon Linux 2023 AMI
        id: ami
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners amazon \
            --filters \
              "Name=name,Values=al2023-ami-2023*-x86_64" \
              "Name=state,Values=available" \
            --query 'reverse(sort_by(Images, &CreationDate))[0].ImageId' \
            --output text)
          echo "ami_id=${AMI_ID}" >> $GITHUB_OUTPUT
          echo "Using AMI: ${AMI_ID}"

      # ── Build user-data bootstrap script ────────────────────────
      # Unquoted heredoc: runner expands $JF_USER / $JF_PASSWORD /
      # $JAR_NAME now; \$! is escaped so it expands later on EC2.
      - name: Write EC2 bootstrap user-data script
        env:
          JF_USER: ${{ env.JF_USER }}
          JF_PASSWORD: ${{ env.JF_PASSWORD }}
          JAR_NAME: ${{ steps.jar.outputs.jar_name }}
        run: |
          cat > /tmp/bootstrap.sh << ENDSCRIPT
          #!/bin/bash
          set -eux
          exec > /var/log/petclinic-boot.log 2>&1

          # Install Java 21 (Amazon Linux 2023 ships dnf)
          dnf install -y java-21-amazon-corretto-headless

          # Download the JAR from JFrog Artifactory
          mkdir -p /opt/petclinic
          curl -fsSL \
            -u "${JF_USER}:${JF_PASSWORD}" \
            "http://18.207.100.83:8082/artifactory/${{ env.JFROG_REPO }}/target/${JAR_NAME}" \
            -o /opt/petclinic/app.jar

          # Launch Spring PetClinic in the background
          nohup java -jar /opt/petclinic/app.jar \
            --server.port=8080 \
            > /var/log/petclinic.log 2>&1 &
          echo \$! > /var/run/petclinic.pid
          echo "PetClinic started (PID \$(cat /var/run/petclinic.pid))"
          ENDSCRIPT
          echo "Bootstrap script written ($(wc -c < /tmp/bootstrap.sh) bytes)"

      # ── Launch the instance ──────────────────────────────────────
      - name: Launch EC2 instance
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "${{ steps.ami.outputs.ami_id }}" \
            --instance-type "${{ env.EC2_INSTANCE_TYPE }}" \
            --security-group-ids "${{ secrets.SMOKE_SG_ID }}" \
            --subnet-id "${{ secrets.SMOKE_SUBNET_ID }}" \
            --associate-public-ip-address \
            --user-data "file:///tmp/bootstrap.sh" \
            --metadata-options "HttpTokens=required,HttpEndpoint=enabled" \
            --tag-specifications \
              "ResourceType=instance,Tags=[{Key=Name,Value=petclinic-smoke-ci},{Key=RunId,Value=${{ github.run_id }}},{Key=ManagedBy,Value=github-actions}]" \
            --query 'Instances[0].InstanceId' \
            --output text)
          echo "instance_id=${INSTANCE_ID}" >> $GITHUB_OUTPUT
          echo "Launched: ${INSTANCE_ID}"

      - name: Wait for instance running and capture public IP
        id: ec2-ip
        run: |
          aws ec2 wait instance-running \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}"
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "public_ip=${PUBLIC_IP}" >> $GITHUB_OUTPUT
          echo "APP_URL=http://${PUBLIC_IP}:8080" >> $GITHUB_ENV
          echo "Instance running at ${PUBLIC_IP}"

      # ── Poll until the app answers (user-data needs time to run) ─
      - name: Wait for PetClinic to become healthy (up to 6 min)
        run: |
          echo "Polling $APP_URL ..."
          for i in $(seq 1 72); do
            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" \
              --max-time 5 "$APP_URL" || true)
            if [[ "$HTTP_CODE" =~ ^(200|301|302)$ ]]; then
              echo "App is UP (HTTP ${HTTP_CODE}) after ~$((i * 5))s"
              exit 0
            fi
            echo "[${i}/72] HTTP ${HTTP_CODE} – waiting 5s..."
            sleep 5
          done
          echo "::error::PetClinic did not become healthy within 6 minutes"
          exit 1

      # ── Playwright smoke tests ───────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright and test dependencies
        run: |
          pip install --quiet \
            playwright \
            pytest \
            pytest-playwright \
            pytest-timeout
          playwright install chromium --with-deps

      - name: Run Playwright smoke tests (5-minute window)
        run: |
          python -m pytest .github/tests/smoke_test.py \
            -v \
            --tb=short \
            --timeout=420 \
            --screenshot=only-on-failure \
            --video=retain-on-failure \
            --output=playwright-results
        env:
          APP_URL: ${{ env.APP_URL }}

      # ── Artifacts ────────────────────────────────────────────────
      - name: Upload smoke test results and browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: playwright-results/
          if-no-files-found: ignore

      # ── Always clean up the EC2 instance ────────────────────────
      - name: Terminate EC2 instance
        if: always()
        run: |
          INSTANCE_ID="${{ steps.ec2.outputs.instance_id }}"
          if [[ -n "$INSTANCE_ID" ]]; then
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
            echo "Terminated: $INSTANCE_ID"
          else
            echo "No instance to terminate (launch step may have failed)"
          fi

